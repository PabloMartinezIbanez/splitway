# Configuración mínima para `supabase start`. Se completará en iter 2 con
# secciones de auth, storage, edge_runtime y demás. El project_id es libre y
# sólo se usa localmente para etiquetar los contenedores.

project_id = "splitway"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
inspector_port = 8083
