name: carnometer_mobile
description: Android-first Flutter shell for the Carnometer PoC.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  carnometer_core:
    path: ../../packages/carnometer_core
  geolocator: ^14.0.2
  mapbox_maps_flutter: ^2.21.1
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  supabase_flutter: ^2.10.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
