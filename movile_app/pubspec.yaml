name: splitway_mobile
description: "Splitway — cronómetro inteligente para rutas. Iter 2: Mapbox real + dibujo de rutas en mapa."

publish_to: 'none'

version: 0.2.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  splitway_core:
    path: ../packages/splitway_core
  geolocator: ^14.0.0
  go_router: ^15.0.0
  intl: ^0.20.0
  mapbox_maps_flutter: ^2.10.0
  sqflite: ^2.4.0
  path: ^1.9.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
  # env/local.json is gitignored. Copy env/local.example.json to env/local.json
  # and uncomment the entry below to bundle real Mapbox/Supabase credentials.
  # assets:
  #   - env/local.json
